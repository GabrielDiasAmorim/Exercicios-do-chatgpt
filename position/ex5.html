<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div.quag {
            height: 96vh;
            background-color: #bddb;
            position: relative;
        }
        div.quap {
            height: 100px;
            width: 100px;
            background-color: #f5ff;
            position: relative;
        }
        div#q1 {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }
        div#q2 {
            position: absolute;
            left: -50%;
            top: -50%;
            transform: translate(50%, -50%);
        }
        div#q3 {
            position: absolute;
            left: -50%;
            bottom: -50%;
            transform: translate(50%, -50%);
        }
        div#q4 {
            position: absolute;
            right: 100%;
            top: 100%;
            transform: translate(100%, 100%);
        }
        div#q5 {
            position: absolute;
            right: -100%;
            bottom: -100%;
            transform: translate(-100%, -100%);
        }

    </style>
</head>
<body>
    <div class="quag">
        <div class="quap" id="q1"></div>
        <div class="quap" id="q2"></div>
        <div class="quap" id="q3"></div>
        <div class="quap" id="q4"></div>
        <div class="quap" id="q5"></div>
    </div>
</body>
</html>
